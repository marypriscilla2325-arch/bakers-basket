<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Bakers Basket</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">🍰 Bakers Basket</h1>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Shop</a></li>
        <li><a href="cart.html">Cart <span id="cart-count">0</span></a></li>
        <li><a href="#" id="auth-btn">Login</a></li>
      </ul>
    </div>
  </nav>

  <section class="cart-section">
    <h2>Shopping Cart</h2>
    <div class="cart-container">
      <div class="cart-items" id="cart-items"></div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal:</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Tax (10%):</span>
          <span id="tax">$0.00</span>
        </div>
        <div class="summary-row total">
          <span>Total:</span>
          <span id="total">$0.00</span>
        </div>
        <a href="checkout.html" class="btn btn-primary btn-full">Proceed to Checkout</a>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Bakers Basket. All rights reserved.</p>
  </footer>

  <script src="js/cart.js"></script>
</body>
</html>
