<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Bakers Basket</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">🍰 Bakers Basket</h1>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Shop</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="#" id="auth-btn">Login</a></li>
      </ul>
    </div>
  </nav>

  <section class="checkout-section">
    <h2>Checkout</h2>
    <div class="checkout-container">
      <div class="checkout-form">
        <h3>Shipping Information</h3>
        <form id="shipping-form">
          <input type="text" placeholder="Full Name" required>
          <input type="email" placeholder="Email" required>
          <input type="text" placeholder="Address" required>
          <input type="text" placeholder="City" required>
          <input type="text" placeholder="ZIP Code" required>
        </form>

        <h3>Payment Information</h3>
        <form id="payment-form">
          <div id="card-element"></div>
          <button type="submit" class="btn btn-primary btn-full">Pay Now</button>
        </form>
      </div>

      <div class="order-summary">
        <h3>Order Summary</h3>
        <div id="order-items"></div>
        <div class="summary-row total">
          <span>Total:</span>
          <span id="checkout-total">$0.00</span>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Bakers Basket. All rights reserved.</p>
  </footer>

  <script src="js/checkout.js"></script>
</body>
</html>
